name: Update polling data

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx pandas openpyxl

      - name: Fetch and convert data
        run: python scripts/fetch_data.py

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view latest-data > /dev/null 2>&1; then
            gh release create latest-data --title "Latest Polling Data" --notes "Automated daily data update"
          fi
          gh release upload latest-data docs/data/polling.json docs/data/.etag --clobber
