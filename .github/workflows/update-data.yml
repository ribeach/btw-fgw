name: Update polling data

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and convert data
        run: python scripts/fetch_data.py

      - name: Fetch state polling data
        run: python scripts/fetch_state_data.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # state-polling.last_update.txt is committed deliberately: it is the
          # state pipeline's change detector and must survive ephemeral runners
          # without actions/cache. The federal pipeline no longer commits a
          # .etag (dropped in Phase 3 / T3.6 — it churned on every fetch);
          # fetch_data.py now short-circuits by comparing parsed records to the
          # committed polling.json instead.
          git add docs/data/polling.json \
                  docs/data/state-polling.json docs/data/state-polling.last_update.txt
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Update polling data $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      - name: Report failure
        if: failure()
        # Hook point for a future Slack/email notification action.
        run: echo "::error title=update-data failed::Daily polling data update failed. Check fetch_data.py / fetch_state_data.py and the dawum/FGW upstreams." && exit 1
