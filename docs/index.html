<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive dashboard mapping German Federal Election Polling Trends from Forschungsgruppe Wahlen (Politbarometer)">
  <title>German Polling Trends — Politbarometer</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='5.33' fill='%23000'/%3E%3Crect y='5.33' width='16' height='5.33' fill='%23D00'/%3E%3Crect y='10.67' width='16' height='5.33' fill='%23FFCE00'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/vendor/plotly.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>German Federal Election Polling Trends</h1>
      <p>Politbarometer data from <a href="https://www.forschungsgruppe.de/Umfragen/Politbarometer/Langzeitentwicklung_-_Themen_im_Ueberblick/Politik_I/#Projektion" target="_blank" rel="noopener">Forschungsgruppe Wahlen</a></p>
      <nav class="page-nav">
        <a href="index.html" aria-current="page">Polling Trends</a>
        <a href="demographics.html">Demographics</a>
      </nav>
    </header>

    <div id="status" class="status-box">
      <div class="spinner"></div> <span>Loading…</span>
    </div>

    <main>
      <div class="chart-container">
        <div id="blocks-chart"></div>
      </div>

      <div class="chart-container">
        <div id="parties-chart"></div>
      </div>
    </main>

    <footer>
      Updated automatically via GitHub Actions • Data source: <a href="https://www.forschungsgruppe.de" target="_blank" rel="noopener">Forschungsgruppe Wahlen</a>
      <br>Trend lines smoothed using an exponentially weighted average (30-day halflife).
    </footer>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
